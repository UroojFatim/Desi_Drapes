    <g transform="rotate(60 28 30)"><ellipse cx="28" cy="14" rx="5" ry="14" fill="#0B6E4F" fill-opacity="0.92"/></g>
    <g transform="rotate(120 28 30)"><ellipse cx="28" cy="14" rx="5" ry="14" fill="#0F5C3B" fill-opacity="0.92"/></g>
    <g transform="rotate(180 28 30)"><ellipse cx="28" cy="14" rx="5" ry="14" fill="#0B6E4F" fill-opacity="0.92"/></g>
    <g transform="rotate(240 28 30)"><ellipse cx="28" cy="14" rx="5" ry="14" fill="#0F5C3B" fill-opacity="0.92"/></g>
    <g transform="rotate(300 28 30)"><ellipse cx="28" cy="14" rx="5" ry="14" fill="#0B6E4F" fill-opacity="0.92"/></g>
